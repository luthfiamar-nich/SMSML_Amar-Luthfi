name: Credit Risk Model CI
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.11.3 dagshub scikit-learn pandas numpy
    
    - name: Run MLFlow Project (Retraining)
      env:
        DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        cd MLProject
        mkdir -p ~/.config/dagshub
        echo "token: $DAGSHUB_TOKEN" > ~/.config/dagshub/credentials
        export MLFLOW_TRACKING_USERNAME="amar.luthfi1854"
        export MLFLOW_TRACKING_PASSWORD=$DAGSHUB_TOKEN
        export DAGSHUB_CLIENT_TOKEN=$DAGSHUB_TOKEN
        mlflow run . -e main --env-manager=local
